<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件共享</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📁</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <div class="brand">
                    <div class="brand-mark">📁</div>
                    <div class="brand-text">
                        <span class="brand-title">文件共享</span>
                        <span class="brand-sub">快速分享，随时随地</span>
                    </div>
                </div>
                <div class="header-actions">
                    <a href="{{ url_for('logout') }}" class="btn btn-ghost btn-sm" title="退出登录">
                        ⏏ 退出
                    </a>
                </div>
            </div>
        </header>
        <!-- 主要内容区域 -->
        <main class="main-content">
            <!-- 上传区域 -->
            <section class="upload-section">
                <div class="card">
                    <!--h2 class="section-title">共享文件</h2-->
                    <div id="fileList" class="file-list">
                        {% if files %}
                            {% for file in files %}
                            <div class="file-item" data-filename="{{ file.name }}">
                                <div class="file-icon">📄</div>
                                <div class="file-info">
                                    <div class="file-name">{{ file.name }}</div>
                                    <div class="file-meta">
                                        <span class="file-size">{{ file.size_str }}</span>
                                        <span class="file-time">{{ file.mtime_str }}</span>
                                    </div>
                                </div>
                                <div class="file-actions">
                                    <a href="{{ url_for('download_file', filename=file.name) }}" 
                                       class="btn btn-download btn-sm"
                                       title="下载">
                                        ⬇️
                                    </a>
                                    <button class="btn btn-delete btn-sm"
                                            onclick="deleteFile('{{ file.name }}')"
                                            title="删除">
                                        🗑️
                                    </button>
                                </div>
                            </div>
                            {% endfor %}
                        {% endif %}                    
                    </div>

                    <form id="uploadForm" class="upload-form">
                        <div class="upload-area" id="uploadArea">
                            <input 
                                type="file" 
                                id="fileInput" 
                                name="file" 
                                class="file-input"
                            >
                            <div class="upload-content">
                                <div class="upload-icon">📤</div>
                                <p class="upload-hint">点击或拖拽文件到此处上传(最大100MB)</p>
                            </div>
                        </div>
                        <div id="selectedFile" class="selected-file" style="display: none;">
                            <span id="fileName"></span>
                            <button type="button" class="btn-remove" id="removeFile">✕</button>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full" id="uploadBtn" disabled>
                            📂 共享文件
                        </button>
                    </form>
                </div>
            </section>
            
            <!-- 文本共享区域 -->
            <section class="text-share-section">
                <div class="card">
                    <!--h2 class="section-title">共享文本</h2-->
                    <form id="textShareForm" class="text-share-form">
                        <textarea
                            id="textContent"
                            name="content"
                            class="form-textarea"
                            rows="3"
                            placeholder="输入要共享的文本内容"
                            required
                        ></textarea>
                        <div class="button-group">
                            <button type="button" class="btn btn-secondary" id="copyTextBtn">
                                📋 复制文本
                            </button>
                            <button type="submit" class="btn btn-primary" id="shareTextBtn">
                                📝 共享文本
                            </button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <!-- 消息提示 -->
    <div id="toast" class="toast"></div>

    <!-- 加载遮罩 -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loading-spinner"></div>
        <p>处理中...</p>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
